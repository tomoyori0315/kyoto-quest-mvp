<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>京都クエスト 〜伏見稲荷〜</title>
<style>
  :root{
    --vermillion:#c4402a; --vermillion-d:#8a2818;
    --wood:#7a4b2a; --wood-d:#5a3418;
    --washi:#f0e6cf; --washi-d:#e0d2b0;
    --ink:#2a2018; --gold:#d9a93a; --ui-line:#caa35f;
    --app-height:100vh; --dpad-size:132px; --dpad-cell:44px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;overflow:hidden;background:#1a140e;}
  body{display:flex;align-items:center;justify-content:center;
    font-family:'Hiragino Maru Gothic ProN','Yu Gothic','YuGothic','Meiryo',sans-serif;
    background:radial-gradient(circle at 30% 20%,#241a12 0%,#14100b 80%);}
  #wrap{position:relative;width:100vw;height:var(--app-height);
    max-width:min(100vw,calc(var(--app-height)*0.5625));max-height:min(var(--app-height),calc(100vw*1.7778));
    aspect-ratio:9/16;background:#000;
    box-shadow:0 0 0 3px var(--wood-d),0 0 40px rgba(0,0,0,.7);overflow:hidden;}
  canvas{position:absolute;inset:0;width:100%;height:100%;
    image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none;}

  .panel{background:linear-gradient(180deg,var(--washi) 0%,var(--washi-d) 100%);
    border:2px solid var(--ui-line);border-radius:8px;
    box-shadow:0 2px 0 rgba(90,52,24,.5),inset 0 1px 0 rgba(255,255,255,.4);color:var(--ink);}
  #hud-top{position:absolute;top:0;left:0;right:0;
    padding:calc(env(safe-area-inset-top) + 8px) 8px 0;display:flex;gap:6px;align-items:flex-start;
    pointer-events:none;z-index:20;}
  #hud-left{flex:1;min-width:0;max-width:calc(100% - 132px);display:flex;flex-direction:column;gap:5px;}
  #hud-actions{display:flex;gap:6px;align-items:flex-start;flex:none;}
  #area-name{flex:1;display:flex;align-items:center;gap:7px;padding:7px 10px;
    font-weight:700;font-size:clamp(12px,3.5vw,16px);line-height:1.25;letter-spacing:.04em;pointer-events:auto;}
  #area-name,#title-name{
    touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;cursor:default;
  }
  #area-name .torii{width:18px;height:16px;flex:none;}
  #cat-count{padding:7px 9px;font-weight:700;font-size:clamp(12px,3.6vw,16px);
    display:flex;align-items:center;gap:5px;white-space:nowrap;}
  #book-btn{width:clamp(40px,11vw,52px);height:clamp(40px,11vw,52px);padding:5px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    pointer-events:auto;cursor:pointer;flex:none;}
  #book-btn .ico{font-size:clamp(17px,4.8vw,21px);line-height:1;display:inline-flex;align-items:center;justify-content:center;width:1.25em;height:1.1em;margin:0 auto -1px;}
  #book-btn .lbl{font-size:9px;font-weight:700;line-height:1;}
  #book-btn:active{transform:translateY(1px);}
  #debug-btn{width:clamp(36px,9vw,44px);height:clamp(28px,8vw,36px);padding:3px;
    display:flex;align-items:center;justify-content:center;
    pointer-events:auto;cursor:pointer;flex:none;font-size:10px;font-weight:700;letter-spacing:.03em;}
  #debug-btn.hidden{display:none;}
  #debug-btn.active{background:linear-gradient(180deg,#2f3b2f,#1b241b);color:#92ff92;border-color:#5eda5e;}
  #debug-btn:active{transform:translateY(1px);}
  #quest-bar{padding:6px 10px;font-size:clamp(10px,3vw,13px);line-height:1.38;color:var(--ink);
    pointer-events:none;display:flex;gap:6px;align-items:flex-start;}
  #quest-bar .q-ico{flex:none;font-size:14px;}
  #quest-bar b{color:var(--vermillion-d);}

  #controls{position:absolute;left:0;right:0;bottom:0;
    padding:0 10px calc(env(safe-area-inset-bottom) + 12px);
    display:flex;justify-content:space-between;align-items:flex-end;z-index:20;pointer-events:none;}
  #dpad{position:relative;width:var(--dpad-size);height:var(--dpad-size);pointer-events:auto;flex:none;touch-action:none;}
  .dbtn{position:absolute;width:var(--dpad-cell);height:var(--dpad-cell);background:linear-gradient(180deg,#f3ead4,#dcc9a4);
    border:2px solid var(--ui-line);color:var(--wood-d);display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:0 2px 0 rgba(90,52,24,.5);}
  .dbtn:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(90,52,24,.5);}
  #d-up{top:0;left:var(--dpad-cell);border-radius:10px 10px 4px 4px;}
  #d-down{bottom:0;left:var(--dpad-cell);border-radius:4px 4px 10px 10px;}
  #d-left{top:var(--dpad-cell);left:0;border-radius:10px 4px 4px 10px;}
  #d-right{top:var(--dpad-cell);right:0;border-radius:4px 10px 10px 4px;}
  #d-center{top:var(--dpad-cell);left:var(--dpad-cell);width:var(--dpad-cell);height:var(--dpad-cell);
    background:radial-gradient(circle,#e8d8b4,#cdb888);border:2px solid var(--ui-line);}
  #act-cluster{display:flex;gap:9px;align-items:flex-end;pointer-events:auto;padding-bottom:6px;}
  .act{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
  .act .circle{width:clamp(48px,13vw,58px);height:clamp(48px,13vw,58px);border-radius:50%;
    background:linear-gradient(180deg,#f3ead4,#d8c39c);border:3px solid var(--ui-line);
    display:flex;align-items:center;justify-content:center;font-size:clamp(20px,6vw,26px);
    box-shadow:0 3px 0 rgba(90,52,24,.5),inset 0 1px 0 rgba(255,255,255,.5);position:relative;}
  .act .lbl{font-size:10px;font-weight:700;color:var(--washi);text-shadow:0 1px 2px rgba(0,0,0,.8);}
  .act:active .circle{transform:translateY(2px);box-shadow:0 1px 0 rgba(90,52,24,.5);}
  .act.primary .circle{background:linear-gradient(180deg,#e9694a,#c4402a);border-color:#e9a060;}
  .act.primary .lbl{color:#fff;}
  .act.disabled{opacity:.4;pointer-events:none;}

  #dialog{position:absolute;left:8px;right:8px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:30;display:none;}
  #dialog.show{display:block;animation:slideUp .18s ease-out;}
  @keyframes slideUp{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  #dialog .box{background:linear-gradient(180deg,#fbf4e2,#efe1c2);border:3px solid var(--wood);
    border-radius:12px;box-shadow:0 4px 0 var(--wood-d),0 6px 16px rgba(0,0,0,.5);padding:14px 16px 16px;position:relative;}
  #dialog .speaker{position:absolute;top:-14px;left:14px;background:var(--vermillion);color:#fff;
    font-weight:700;font-size:13px;padding:3px 13px;border-radius:7px;border:2px solid #e9a060;
    box-shadow:0 2px 0 var(--vermillion-d);}
  #dialog .speaker.cat{background:var(--gold);border-color:#f0d27a;color:#3a2a10;box-shadow:0 2px 0 #a87c1e;}
  #dialog .dialog-layout{display:block;}
  #dialog.cat-mode .dialog-layout{display:flex;gap:10px;align-items:stretch;}
  #dialog .dialog-text{min-width:0;position:relative;padding-bottom:12px;}
  #dialog.cat-mode .dialog-text{flex:1;}
  #dialog .cat-portrait{display:none;flex:0 0 clamp(86px,26vw,100px);align-items:center;justify-content:center;}
  #dialog.cat-mode .cat-portrait{display:flex;}
  #dialog .cat-closeup{display:block;width:100%;max-height:112px;height:auto;object-fit:contain;
    border:2px solid var(--ui-line);border-radius:10px;background:#f8efd9;box-shadow:0 2px 0 rgba(90,52,24,.3);}
  #dialog .text{color:var(--ink);font-size:clamp(14px,4vw,17px);line-height:1.65;min-height:3.3em;
    margin-top:6px;white-space:pre-wrap;font-weight:500;}
  #dialog .more-tag{display:inline-block;margin-top:6px;font-size:12px;color:var(--vermillion-d);
    font-weight:700;text-decoration:underline;cursor:pointer;}
  #dialog .next{position:absolute;right:14px;bottom:10px;color:var(--vermillion);font-size:18px;animation:bob .8s infinite;}
  #dialog.cat-mode .next{right:auto;left:16px;bottom:8px;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(3px);}}
  #dialog .learn{margin-top:8px;padding:8px 10px;background:rgba(217,169,58,.18);
    border-left:3px solid var(--gold);border-radius:5px;font-size:13px;line-height:1.55;color:#5a4418;display:none;}
  #dialog .learn.show{display:block;}
  #dialog .learn b{color:var(--vermillion-d);}

  #book{position:absolute;inset:0;z-index:40;display:none;background:rgba(20,14,8,.7);
    backdrop-filter:blur(2px);padding:calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 28px);}
  #book.show{display:flex;flex-direction:column;animation:fade .2s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  #book .cover{background:linear-gradient(160deg,#f5ecd6,#e6d4ae);border:3px solid var(--wood);
    border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.6);flex:1;min-height:0;max-height:calc(var(--app-height) - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 42px);display:flex;flex-direction:column;
    overflow:hidden;position:relative;}
  #book .cover::before{content:"";position:absolute;left:0;top:0;bottom:0;width:14px;
    background:linear-gradient(90deg,var(--vermillion),var(--vermillion-d));box-shadow:inset -2px 0 4px rgba(0,0,0,.3);}
  #book h2{font-size:18px;color:var(--ink);text-align:center;padding:16px 16px 8px 22px;font-weight:700;letter-spacing:.08em;}
  #book .tabs{display:flex;gap:6px;padding:0 16px 10px 22px;}
  #book .tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:700;background:var(--washi-d);
    border:2px solid var(--ui-line);border-radius:7px;color:var(--wood-d);cursor:pointer;}
  #book .tab.active{background:var(--vermillion);color:#fff;border-color:#e9a060;}
  #book .pages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 16px 12px 22px;}
  #book .entry{background:rgba(255,255,255,.5);border:1px solid var(--ui-line);border-radius:8px;
    padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.5;color:var(--ink);display:flex;gap:9px;align-items:flex-start;}
  #book .entry .e-ico{font-size:20px;flex:none;}
  #book .entry.cat-entry{align-items:center;gap:11px;}
  #book .entry .cat-book-icon{width:58px;height:58px;border-radius:10px;object-fit:cover;flex:none;
    border:2px solid var(--ui-line);background:#f8efd9;box-shadow:0 2px 0 rgba(90,52,24,.25);}
  #book .entry b{color:var(--vermillion-d);display:block;margin-bottom:2px;font-size:14px;}
  #book .empty{text-align:center;color:#9a8868;padding:30px 10px;font-size:13px;line-height:1.7;}
  #book .close{margin:0 16px 12px 22px;padding:11px;text-align:center;background:var(--wood);color:#fff;
    font-weight:700;border-radius:9px;cursor:pointer;box-shadow:0 3px 0 var(--wood-d);font-size:15px;}
  #book .close:active{transform:translateY(2px);box-shadow:0 1px 0 var(--wood-d);}

  #toast-layer{position:absolute;left:0;right:0;top:28%;z-index:35;display:flex;flex-direction:column;
    align-items:center;gap:8px;pointer-events:none;}
  .toast{background:linear-gradient(180deg,#fbf4e2,#efe1c2);border:2px solid var(--gold);border-radius:10px;
    padding:10px 18px;font-size:14px;font-weight:700;color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.4);
    display:flex;align-items:center;gap:8px;text-align:center;
    animation:toastIn .3s ease-out,toastOut .4s ease-in 1.9s forwards;}
  @keyframes toastIn{from{transform:scale(.8) translateY(-10px);opacity:0;}to{transform:scale(1);opacity:1;}}
  @keyframes toastOut{to{opacity:0;transform:translateY(-8px);}}
  .toast .t-ico{font-size:20px;}

  #title{position:absolute;inset:0;z-index:50;
    background:linear-gradient(180deg,#2a1810 0%,#48241a 45%,#6a3420 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:20px;}
  #title.hide{display:none;}
  #title .torii-big{width:120px;height:108px;margin-bottom:6px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));}
  #title h1{color:#fbe9c0;font-size:30px;letter-spacing:.14em;font-weight:700;
    text-shadow:0 3px 0 #6a1810,0 5px 10px rgba(0,0,0,.6);}
  #title .sub{color:#e9b878;font-size:14px;letter-spacing:.34em;margin-top:2px;}
  #title .start{margin-top:24px;padding:14px 40px;font-size:17px;font-weight:700;
    background:linear-gradient(180deg,#f3ead4,#d8c39c);color:var(--wood-d);border:3px solid var(--gold);
    border-radius:30px;cursor:pointer;box-shadow:0 4px 0 #a87c1e;animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  #title .hint{color:#c89868;font-size:11px;margin-top:18px;line-height:1.6;}
  #debug-editor{position:absolute;right:6px;bottom:calc(env(safe-area-inset-bottom) + 154px);z-index:28;
    width:min(190px,calc(100% - 12px));display:none;background:rgba(20,14,8,.68);border:2px solid rgba(94,218,94,.85);border-radius:8px;color:#eaffea;
    padding:6px;font:10px ui-monospace,SFMono-Regular,Menlo,monospace;pointer-events:auto;backdrop-filter:blur(3px);}
  #debug-editor.show{display:block;}
  #debug-editor .dbg-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin:4px 0;}
  #debug-editor .dbg-head{justify-content:space-between;}
  #debug-editor .dbg-full{display:block;}
  #debug-editor.minimized .dbg-full{display:none;}
  #debug-editor label{display:flex;align-items:center;gap:3px;}
  #debug-editor input,#debug-editor select{width:48px;background:#e8f6d8;color:#172015;border:1px solid #5eda5e;border-radius:4px;padding:3px;font:inherit;}
  #debug-editor select{width:92px;}
  #debug-editor button{background:#d8f0c0;color:#172015;border:1px solid #5eda5e;border-radius:4px;padding:3px 5px;font:inherit;}
  #debug-editor button:disabled{opacity:.45;}
  #debug-editor textarea{width:100%;height:38px;background:rgba(7,16,7,.86);color:#caffca;border:1px solid #5eda5e;border-radius:4px;padding:4px;font:inherit;resize:none;}
  #debug-editor .dbg-info{opacity:.9;line-height:1.35;}
  #debug-editor input,#debug-editor textarea{-webkit-user-select:text;user-select:text;}
  #controls,#dpad,.dbtn,#act-cluster,.act,#book-btn,#debug-btn,#start-btn,#dialog,#debug-editor button{
    touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
  }
  @media(max-height:700px){
    :root{--dpad-size:120px;--dpad-cell:40px;}
    #hud-top{padding:calc(env(safe-area-inset-top) + 5px) 6px 0;gap:5px;}
    #hud-left{max-width:calc(100% - 120px);gap:4px;}
    #area-name{padding:5px 8px;font-size:12px;}
    #quest-bar{padding:5px 8px;font-size:10px;line-height:1.25;}
    #cat-count{padding:5px 7px;font-size:12px;}
    #book-btn{width:40px;height:40px;padding:4px;}
    #debug-btn{width:36px;height:28px;}
    #controls{padding:0 8px calc(env(safe-area-inset-bottom) + 7px);}
    #act-cluster{padding-bottom:3px;}
    .act .circle{width:48px;height:48px;}
    #dialog{bottom:calc(env(safe-area-inset-bottom) + 8px);}
    #dialog .box{padding:12px 14px 14px;}
    #dialog .text{font-size:14px;line-height:1.5;}
    #debug-editor{right:4px;bottom:calc(env(safe-area-inset-bottom) + 132px);max-height:145px;overflow:auto;}
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud-top">
    <div id="hud-left">
      <div class="panel" id="area-name">
        <svg class="torii" viewBox="0 0 18 16"><rect x="1" y="2" width="16" height="2.5" fill="#c4402a"/><rect x="2" y="5" width="14" height="1.5" fill="#c4402a"/><rect x="3" y="3" width="2.5" height="13" fill="#c4402a"/><rect x="12.5" y="3" width="2.5" height="13" fill="#c4402a"/></svg>
        <span id="area-label">伏見稲荷 大鳥居前</span>
      </div>
      <div class="panel" id="quest-bar">
        <span class="q-ico">🎯</span>
        <div><b>次の目標</b><br><span id="quest-text">楼門にお参りしよう</span></div>
      </div>
    </div>
    <div id="hud-actions">
      <div class="panel" id="cat-count">🐾 <span id="cat-n">0</span>/<span id="cat-total">0</span></div>
      <div class="panel" id="book-btn"><span class="ico">📒</span><span class="lbl">帳面</span></div>
      <div class="panel hidden" id="debug-btn">DBG</div>
    </div>
  </div>

  <div id="dialog"><div class="box">
    <div class="speaker" id="dlg-speaker">案内役</div>
    <div class="dialog-layout">
      <div class="dialog-text">
        <div class="text" id="dlg-text"></div>
        <div class="learn" id="dlg-learn"></div>
        <span class="more-tag" id="dlg-more" style="display:none">もっと読む ▾</span>
      </div>
      <div class="cat-portrait"><img class="cat-closeup" id="dlg-cat-img" alt=""></div>
    </div>
    <div class="next" id="dlg-next">▼</div>
  </div></div>

  <div id="book"><div class="cover">
    <h2>旅の帳面</h2>
    <div class="tabs">
      <div class="tab active" data-tab="cat">🐱 猫帳</div>
      <div class="tab" data-tab="spot">⛩️ 見聞</div>
      <div class="tab" data-tab="visit">📿 参拝</div>
    </div>
    <div class="pages" id="book-pages"></div>
    <div class="close" id="book-close">とじる</div>
  </div></div>

  <div id="controls">
    <div id="dpad">
      <div class="dbtn" id="d-up">▲</div>
      <div class="dbtn" id="d-left">◀</div>
      <div class="dbtn" id="d-center"></div>
      <div class="dbtn" id="d-right">▶</div>
      <div class="dbtn" id="d-down">▼</div>
    </div>
    <div id="act-cluster">
      <div class="act primary disabled" id="act-main">
        <div class="circle" id="act-icon">🔍</div>
        <div class="lbl" id="act-label">しらべる</div>
      </div>
    </div>
  </div>

  <div id="toast-layer"></div>

  <div id="debug-editor">
    <div class="dbg-row dbg-head">
      <b>Blocker</b>
      <select id="dbg-blocker-select"></select>
      <button id="dbg-copy">Copy config</button>
      <button id="dbg-min">min</button>
    </div>
    <div class="dbg-full">
      <div class="dbg-row">
        <label>x <input id="dbg-bx" type="number" step="1"></label>
        <label>y <input id="dbg-by" type="number" step="1"></label>
        <label>w <input id="dbg-bw" type="number" step="1"></label>
        <label>h <input id="dbg-bh" type="number" step="1"></label>
      </div>
      <div class="dbg-row">
        <span>focus</span><button data-dbg-step="-5">-5</button><button data-dbg-step="-1">-1</button>
        <button data-dbg-step="1">+1</button><button data-dbg-step="5">+5</button>
      </div>
      <div class="dbg-row">
        <span>W</span><button data-dbg-size="w" data-dbg-size-step="-5">-5</button><button data-dbg-size="w" data-dbg-size-step="-1">-1</button>
        <button data-dbg-size="w" data-dbg-size-step="1">+1</button><button data-dbg-size="w" data-dbg-size-step="5">+5</button>
      </div>
      <div class="dbg-row">
        <span>H</span><button data-dbg-size="h" data-dbg-size-step="-5">-5</button><button data-dbg-size="h" data-dbg-size-step="-1">-1</button>
        <button data-dbg-size="h" data-dbg-size-step="1">+1</button><button data-dbg-size="h" data-dbg-size-step="5">+5</button>
      </div>
      <div class="dbg-row">
        <button id="dbg-add">Add</button>
        <button id="dbg-dup">Duplicate</button>
        <button id="dbg-del">Delete</button>
        <button id="dbg-round">Round</button>
      </div>
      <div class="dbg-row">
        <b>Player</b>
        <label>collision <input id="dbg-player-r" type="number" step="1" min="0"></label>
      </div>
      <div class="dbg-row">
        <span>R</span><button data-dbg-player-step="-5">-5</button><button data-dbg-player-step="-1">-1</button>
        <button data-dbg-player-step="1">+1</button><button data-dbg-player-step="5">+5</button>
      </div>
      <div class="dbg-row dbg-head">
        <b>Entity</b>
        <select id="dbg-entity-select"></select>
      </div>
      <div class="dbg-row">
        <label>x <input id="dbg-ex" type="number" step="1"></label>
        <label>y <input id="dbg-ey" type="number" step="1"></label>
        <label>r <input id="dbg-er" type="number" step="1" min="1"></label>
      </div>
      <div class="dbg-row">

function flipCanvasPixelsY(c,g){
  try{
    const src=g.getImageData(0,0,c.width,c.height);

    for(let y=0;y<c.height;y++){

function drawGroundShadow(sx,sy,offY,rx,ry,alpha){
  ctx.fillStyle=`rgba(0,0,0,${alpha})`;
  ctx.beginPath();
  ctx.ellipse(sx,sy+offY,rx,ry,0,0,7);
  ctx.fill();
}
function drawPlayerFallback(sx,sy){
  const walk=P.moving&&((P.anim>>3)&1),leg=walk?1:0;
  const skin='#e8c4a0',hair='#3a2a1c',shirt='#3e7ab0',pants='#3a4658',bag='#b5662e';
  drawGroundShadow(sx,sy,6,5.4,1.8,.16);
  if(P.dir==='up'){
    R(sx-4,sy-12,8,5,hair);R(sx-5,sy-7,10,9,shirt);R(sx-4,sy-6,8,7,bag);
    R(sx-3,sy-4,2,3,'#8a4a20');R(sx+1,sy-4,2,3,'#8a4a20');
    R(sx-4,sy+2,4,4+leg,pants);R(sx,sy+2,4,4-leg,pants);
  }else if(P.dir==='down'){
    R(sx-4,sy-12,8,6,hair);R(sx-3,sy-9,6,4,skin);
    R(sx-2,sy-7,1,1,'#2a1c12');R(sx+1,sy-7,1,1,'#2a1c12');
    R(sx-5,sy-5,10,8,shirt);R(sx-6,sy-4,2,6,bag);R(sx+4,sy-4,2,6,bag);
    R(sx-4,sy+2,4,4+leg,pants);R(sx,sy+2,4,4-leg,pants);
  }else{
    const f=P.dir==='left';ctx.save();if(f){ctx.translate(sx*2,0);ctx.scale(-1,1);}
    const x=sx;
    R(x-4,sy-12,8,6,hair);R(x-1,sy-9,5,4,skin);R(x+2,sy-7,1,1,'#2a1c12');
    R(x-5,sy-5,9,8,shirt);R(x-6,sy-4,3,7,bag);
    R(x-3,sy+2,3,4+leg,pants);R(x+1,sy+2,3,4-leg,pants);
    ctx.restore();
  }
}
function drawPlayer(sx,sy){
  if(P.moving&&(P.dir==='left'||P.dir==='right')&&PLAYER_SIDE_WALK.ready){
    const idx=PLAYER_SIDE_WALK.sequence[Math.floor(P.anim/10)%PLAYER_SIDE_WALK.sequence.length];
    const frame=PLAYER_SIDE_WALK.frames[idx];
    if(frame){drawPlayerSideWalkFrame(frame,sx,sy,P.dir);return;}
  }
  if(USE_VERTICAL_WALK&&P.moving&&(P.dir==='up'||P.dir==='down')){
    const cfg=PLAYER_VERTICAL_WALK[P.dir];
    if(cfg&&cfg.ready){
      const frameName=PLAYER_VERTICAL_WALK.sequence[Math.floor(P.anim/10)%PLAYER_VERTICAL_WALK.sequence.length];
      const frame=cfg.frames[frameName];
      if(frame){drawPlayerVerticalWalkFrame(frame,cfg,frameName,sx,sy);return;}
    }
  }
  const frame=PLAYER_IDLE.frames[P.dir]||PLAYER_IDLE.frames.down;
  if(!PLAYER_IDLE.ready||!frame){drawPlayerFallback(sx,sy);return;}
  const drawH=PLAYER_IDLE.drawH,drawW=PLAYER_IDLE.cellW/PLAYER_IDLE.cellH*drawH;
  const off=PLAYER_IDLE.offsets[P.dir]||{x:0,y:0};
  drawGroundShadow(sx,sy,5,5.8,1.8,.17);
  ctx.drawImage(frame,sx-drawW/2+off.x,sy-drawH+off.y,drawW,drawH);
}
function drawPlayerSideWalkFrame(frame,sx,sy,dir){
  const drawH=PLAYER_SIDE_WALK.drawH,drawW=PLAYER_SIDE_WALK.cellW/PLAYER_SIDE_WALK.cellH*drawH;
  const off=PLAYER_SIDE_WALK.offsets[dir]||PLAYER_SIDE_WALK.offsets.right;
  const drawX=sx-drawW/2+off.x,drawY=sy-drawH+off.y;
  drawGroundShadow(sx,sy,5,5.8,1.8,.17);
  if(dir==='left'){
    ctx.save();
    ctx.translate(drawX+drawW,drawY);
    ctx.scale(-1,1);
    ctx.drawImage(frame,0,0,drawW,drawH);
    ctx.restore();
  }else{
    ctx.drawImage(frame,drawX,drawY,drawW,drawH);
  }
}
function drawPlayerVerticalWalkFrame(frame,cfg,frameName,sx,sy){
  const drawH=cfg.drawH,drawW=cfg.cellW/cfg.cellH*drawH;
  const off=cfg.frameOffsets[frameName]||cfg.frameOffsets.idle||{x:0,y:0};
  const drawX=sx-drawW/2+off.x,drawY=sy-drawH+off.y;
  drawGroundShadow(sx,sy,5,5.8,1.8,.17);
  ctx.drawImage(frame,drawX,drawY,drawW,drawH);
}

//============ 当たり判定 ============
function canWalk(x,y){
  const map=MAPS[SCENE],w=map.walkable;
  const r=PLAYER_COLLISION_R;
  if(x-r<w.left||x+r>w.right)return false;
  if(y-r<w.top+6||y+r>w.bottom)return false;
  for(const b of map.blockers){
    if(Math.abs(x-b.x)<b.halfW+r&&Math.abs(y-b.y)<b.halfH+r)return false;
  }
  return true;
}

//============ 近接判定 ============
function updateNearest(){
  let best=null,bd=1e9;
  for(const e of ENTITIES){const d=Math.hypot(P.x-e.x,P.y-e.y);if(d<e.r&&d<bd){bd=d;best=e;}}
  game.nearest=best;
  const a=document.getElementById('act-main'),ic=document.getElementById('act-icon'),lb=document.getElementById('act-label');
  if(best){a.classList.remove('disabled');
    ic.textContent={npc:'💬',cat:'🐾',object:'🔍',exit:'➡️'}[best.type]||'🔍';lb.textContent=best.act;}
  else{a.classList.add('disabled');ic.textContent='🔍';lb.textContent='しらべる';}
}

let dlg={active:false,lines:[],idx:0,ent:null};
function startDialog(e){
  if(!e.lines&&!e.react)return;
  dlg.active=true;dlg.ent=e;dlg.idx=0;
  dlg.lines=(e.type==='cat')?[{t:e.react,learn:e.learn?('<b>'+e.name+'</b>\n'+e.learn):null}]:e.lines;
  showPage();document.getElementById('dialog').classList.add('show');
}
function showPage(){
  const pg=dlg.lines[dlg.idx],sp=document.getElementById('dlg-speaker');
  sp.textContent=dlg.ent.name;sp.className='speaker'+(dlg.ent.type==='cat'?' cat':'');
  const dialog=document.getElementById('dialog');
  const catImg=document.getElementById('dlg-cat-img'),catMeta=CAT_META[dlg.ent.id];
  if(dlg.ent.type==='cat'&&catMeta?.closeup){
    dialog.classList.add('cat-mode');
    catImg.src=catMeta.closeup;catImg.onerror=()=>{dialog.classList.remove('cat-mode');catImg.removeAttribute('src');};
  }else{dialog.classList.remove('cat-mode');catImg.removeAttribute('src');catImg.onerror=null;}
  document.getElementById('dlg-text').textContent=pg.t;
  const L=document.getElementById('dlg-learn'),M=document.getElementById('dlg-more');
  L.classList.remove('show');L.innerHTML='';
  M.onclick=null;
  if(pg.learn){
    M.style.display='inline-block';
    M.onpointerdown=e=>{e.preventDefault();e.stopPropagation();L.innerHTML=pg.learn;L.classList.add('show');M.style.display='none';};
  }
  else{M.style.display='none';M.onpointerdown=null;}
}
function advance(){
  const pg=dlg.lines[dlg.idx];
  if(pg.spot&&!game.spots[pg.spot]){game.spots[pg.spot]=true;
    toast('📖','見聞を記録した',SPOT_FULL[pg.spot]?.title||'');}
  dlg.idx++;
  if(dlg.idx>=dlg.lines.length)endDialog();else showPage();
}
function endDialog(){
  const e=dlg.ent;
  dlg.active=false;document.getElementById('dialog').classList.remove('show','cat-mode');
  if(e.type==='cat'&&!game.cats[e.id]){game.cats[e.id]=true;updateCatCount();toast('🐱','猫帳に登録！',e.name);}
  if(e&&e.visit){recordVisit(e.visit,e.name);
    if(e.id==='honden'){setQuest('千本鳥居へ向かおう');setTimeout(()=>toast('🎉','本殿にお参り完了！','お山めぐりの第一歩や'),700);}
    if(e.id==='senbon'){setQuest('（MVPはここまで。続きは拡張で！）');setTimeout(()=>toast('🎉','千本鳥居を抜けた！','この先は奥社…続きは次回！'),700);}
  }
  dlg.ent=null;
}

  if(document.getElementById('book').classList.contains('show'))return;
  const e=game.nearest;if(!e)return;
  if(e.type==='exit'){goExit(e);return;}
  startDialog(e);
}

function enterScene(sceneId,showToast=true,spawnOverride=null){

  SCENE=map.id;WORLD_H=map.worldH;

  P.x=spawn.x;P.y=spawn.y;P.dir=spawn.dir;P.moving=false;

  debugEditor.selected=0;debugEditor.entitySelected=0;updateDebugEditor();
  if(showToast)toast('⛩️',map.areaLabel,map.toastSub||'');
}

// 開発用の隠しデバッグ入口。通常URLではDBG UIを出さない。
function debugStorageSet(enabled){
  try{
    if(enabled)localStorage.setItem(DEBUG_STORAGE_KEY,'1');
    else localStorage.removeItem(DEBUG_STORAGE_KEY);
  }catch(_){}
}
function debugStorageGet(){
  try{return localStorage.getItem(DEBUG_STORAGE_KEY)==='1';}
  catch(_){return false;}
}
function applyDebugEnabled(enabled,notify=false){
  game.debugEnabled=!!enabled;
  if(!game.debugEnabled)game.debug=false;
  const btn=document.getElementById('debug-btn');
  btn.classList.toggle('hidden',!game.debugEnabled);
  btn.classList.toggle('active',game.debugEnabled&&game.debug);
  updateDebugEditor();
  if(notify)toast(game.debugEnabled?'🛠️':'✅',game.debugEnabled?'DBG enabled':'DBG disabled','');
}
function initDebugAccess(){
  const params=new URLSearchParams(location.search);
  if(params.get('debug')==='1'){debugStorageSet(true);applyDebugEnabled(true);return;}
  if(params.get('debug')==='0'){debugStorageSet(false);applyDebugEnabled(false);return;}
  applyDebugEnabled(debugStorageGet());
}
function bindDebugSecretTap(el){
  let taps=[];
  const onTap=e=>{
    e.preventDefault();e.stopPropagation();
    const now=Date.now();
    taps=taps.filter(t=>now-t<2000);taps.push(now);
    if(taps.length>=5){
      taps=[];
      const next=!game.debugEnabled;
      debugStorageSet(next);applyDebugEnabled(next,true);
    }
  };
  if('ontouchstart' in window)el.addEventListener('touchstart',onTap,{passive:false});
  else el.addEventListener('pointerdown',onTap);
}
function toggleDebug(){
  if(!game.debugEnabled){game.debug=false;updateDebugEditor();return;}
  game.debug=!game.debug;
  document.getElementById('debug-btn').classList.toggle('active',game.debug);
  updateDebugEditor();
}

}
function updateDebugEditor(){
  const editor=document.getElementById('debug-editor');
  editor.classList.toggle('show',game.debugEnabled&&game.debug);
  editor.classList.toggle('minimized',debugEditor.minimized);
  if(!game.debugEnabled||!game.debug)return;
  const map=MAPS[SCENE],sel=document.getElementById('dbg-blocker-select'),entSel=document.getElementById('dbg-entity-select');
  const count=map.blockers.length;
  debugEditor.selected=Math.max(0,Math.min(debugEditor.selected,count-1));
  debugEditor.entitySelected=Math.max(0,Math.min(debugEditor.entitySelected,ENTITIES.length-1));
  sel.innerHTML='';
  map.blockers.forEach((b,i)=>{
    const opt=document.createElement('option');
    opt.value=i;opt.textContent=`${i}: x${Math.round(b.x)} y${Math.round(b.y)} w${Math.round(b.halfW*2)} h${Math.round(b.halfH*2)}`;
    sel.appendChild(opt);
  });
  if(!count){
    const opt=document.createElement('option');opt.value='';opt.textContent='blockerなし';sel.appendChild(opt);
  }
  sel.value=String(debugEditor.selected);
  const b=map.blockers[debugEditor.selected];
  entSel.innerHTML='';
  ENTITIES.forEach((e,i)=>{
    const opt=document.createElement('option');
    opt.value=i;opt.textContent=`${i}: ${e.id||e.name} ${e.type} x${Math.round(e.x)} y${Math.round(e.y)} r${Math.round(e.r)}`;
    entSel.appendChild(opt);
  });
  if(!ENTITIES.length){
    const opt=document.createElement('option');opt.value='';opt.textContent='entityなし';entSel.appendChild(opt);
  }
  entSel.value=String(debugEditor.entitySelected);
  const ent=ENTITIES[debugEditor.entitySelected];
  for(const [id,val] of [['dbg-bx',b?.x],['dbg-by',b?.y],['dbg-bw',b?b.halfW*2:null],['dbg-bh',b?b.halfH*2:null]]){
    const input=document.getElementById(id);
    input.disabled=!b;input.value=b?Math.round(val):'';
  }
  document.getElementById('dbg-player-r').value=Math.round(PLAYER_COLLISION_R);
  for(const [id,val] of [['dbg-ex',ent?.x],['dbg-ey',ent?.y],['dbg-er',ent?.r]]){
    const input=document.getElementById(id);
    input.disabled=!ent;input.value=ent?Math.round(val):'';
  }
  document.getElementById('dbg-dup').disabled=!b;
  document.getElementById('dbg-del').disabled=!b;
  const info=document.getElementById('dbg-info');
  const selectedText=b?` selected=${debugEditor.selected} x${b.x} y${b.y} w${Math.round(b.halfW*2)} h${Math.round(b.halfH*2)}`:' selected=none';
  const entText=ent?` entity=${ent.id||ent.name} r${ent.r}`:' entity=none';
  info.textContent=`scene=${SCENE}${selectedText}${entText} playerCollision=${PLAYER_COLLISION_R}px`;
  document.getElementById('dbg-min').textContent=debugEditor.minimized?'max':'min';
  document.getElementById('dbg-map-output').value=debugConfigText();
}

  ctx.font='6px monospace';ctx.textBaseline='top';
  const w=ctx.measureText(text).width+3;
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(x-1,y-1,w,8);
  ctx.fillStyle='#ffffff';ctx.fillText(text,x,y);
}
function debugEntityColor(type){
  if(type==='cat')return {stroke:'rgba(255,226,80,.95)',fill:'rgba(255,226,80,.14)'};
  if(type==='npc')return {stroke:'rgba(205,120,255,.95)',fill:'rgba(205,120,255,.14)'};
  if(type==='exit')return {stroke:'rgba(80,255,140,.95)',fill:'rgba(80,255,140,.14)'};
  return {stroke:'rgba(255,150,64,.95)',fill:'rgba(255,150,64,.14)'};
}
function drawDebug(camY){
  const map=MAPS[SCENE],w=map.walkable;
  ctx.save();
  ctx.lineWidth=1;
  ctx.fillStyle='rgba(64,255,128,.12)';
  ctx.strokeStyle='rgba(64,255,128,.9)';
  ctx.fillRect(w.left,w.top-camY,w.right-w.left,w.bottom-w.top);
  ctx.strokeRect(w.left+.5,w.top-camY+.5,w.right-w.left,w.bottom-w.top);
  debugLabel(`walk ${w.left},${w.top}-${w.right},${w.bottom}`,w.left+2,w.top-camY+3);

  ctx.fillStyle='rgba(255,80,80,.22)';
  ctx.strokeStyle='rgba(255,80,80,.95)';
  for(let i=0;i<map.blockers.length;i++){
    const b=map.blockers[i],selected=i===debugEditor.selected;
    const x=b.x-b.halfW,y=b.y-camY-b.halfH,wid=b.halfW*2,hei=b.halfH*2;
    ctx.fillStyle=selected?'rgba(255,220,64,.28)':'rgba(255,80,80,.22)';
    ctx.strokeStyle=selected?'rgba(255,240,80,1)':'rgba(255,80,80,.95)';
    ctx.lineWidth=selected?2:1;
    ctx.fillRect(x,y,wid,hei);ctx.strokeRect(x+.5,y+.5,wid,hei);
    if(selected){
      const hs=3;
      ctx.fillStyle='rgba(255,255,255,.95)';
      ctx.strokeStyle='rgba(70,40,0,.95)';
      for(const [hx,hy] of [[x,y],[x+wid,y],[x,y+hei],[x+wid,y+hei]]){
        ctx.fillRect(hx-hs/2,hy-hs/2,hs,hs);
        ctx.strokeRect(hx-hs/2+.5,hy-hs/2+.5,hs,hs);
      }
    }
  }
  ctx.lineWidth=1;

  ctx.font='6px monospace';
  for(let i=0;i<ENTITIES.length;i++){
    const e=ENTITIES[i],selected=i===debugEditor.entitySelected;
    const sy=e.y-camY;if(sy<-40||sy>VH+40)continue;
    const col=debugEntityColor(e.type);
    ctx.strokeStyle=selected?'rgba(255,255,255,1)':col.stroke;
    ctx.fillStyle=col.fill;
    ctx.lineWidth=selected?2:1;
    ctx.beginPath();ctx.arc(e.x,sy,e.r,0,7);ctx.fill();ctx.stroke();
    R(e.x-1,sy-1,3,3,selected?'#fff4a0':'#ffffff');
    debugLabel(e.id||e.name,e.x+3,sy-e.r-8);
  }
  ctx.lineWidth=1;

  const pr=Math.max(PLAYER_COLLISION_R,2);
  ctx.strokeStyle='rgba(80,220,255,.95)';
  ctx.fillStyle='rgba(80,220,255,.12)';
  ctx.beginPath();ctx.arc(P.x,P.y-camY,pr,0,7);ctx.fill();ctx.stroke();
  debugLabel(`player r${PLAYER_COLLISION_R}`,P.x+4,P.y-camY-pr-9);

  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(3,3,86,20);
  ctx.fillStyle='#92ff92';ctx.font='7px monospace';ctx.textBaseline='top';
  ctx.fillText(`DBG ${SCENE}`,6,5);
  ctx.fillText(`P ${P.x.toFixed(1)},${P.y.toFixed(1)}`,6,14);
  ctx.restore();
}

//============ 帳面 ============
function openBook(tab){document.getElementById('book').classList.add('show');renderBook(tab||'cat');}
function renderBook(tab){
  document.querySelectorAll('#book .tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const pages=document.getElementById('book-pages');pages.innerHTML='';let items=[];
  if(tab==='cat'){for(const id in game.cats){const m=CAT_META[id];if(m)items.push(m);}
    renderEntries(pages,items,'まだ猫に出会ってへん。\n参道を歩いて探してみよう🐾');}
  else if(tab==='spot'){for(const id in game.spots){const m=SPOT_FULL[id];if(m)items.push({ico:m.ico,name:m.title,text:m.text});}
    renderEntries(pages,items,'まだ何も調べてへん。\n鳥居や案内板を調べてみよう🔍');}
  else{for(const id in game.visits){const m=VISIT_META[id];if(m)items.push(m);}
    renderEntries(pages,items,'まだお参りしてへん。\n本殿でお参りしてみよう📿');}
}
function renderEntries(el,items,empty){
  if(!items.length){el.innerHTML=`<div class="empty">${empty}</div>`;return;}
  items.forEach(m=>{const d=document.createElement('div');d.className='entry';
    if(m.icon){
      d.classList.add('cat-entry');
      d.innerHTML=`<img class="cat-book-icon" src="${m.icon}" alt=""><span class="e-ico" style="display:none">${m.ico}</span><div><b>${m.name||m.title}</b>${m.text}</div>`;
      const img=d.querySelector('img'),fallback=d.querySelector('.e-ico');
      img.onerror=()=>{img.style.display='none';fallback.style.display='inline-block';};
    }else{
      d.innerHTML=`<span class="e-ico">${m.ico}</span><div><b>${m.name||m.title}</b>${m.text}</div>`;
    }
    el.appendChild(d);});
}

//============ 入力 ============
const held={up:false,down:false,left:false,right:false};
function suppressNativeTouch(id){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
}
function bindDir(id,dir){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();el.setPointerCapture?.(e.pointerId);held[dir]=true;};
  const off=e=>{e.preventDefault();held[dir]=false;};
  el.addEventListener('pointerdown',on);el.addEventListener('pointerup',off);
  el.addEventListener('pointerleave',off);el.addEventListener('pointercancel',off);el.addEventListener('lostpointercapture',off);
}
bindDir('d-up','up');bindDir('d-down','down');bindDir('d-left','left');bindDir('d-right','right');
suppressNativeTouch('controls');suppressNativeTouch('hud-actions');suppressNativeTouch('dialog');suppressNativeTouch('start-btn');
document.getElementById('dbg-blocker-select').addEventListener('change',e=>{debugEditor.selected=Number(e.target.value)||0;updateDebugEditor();});
document.getElementById('dbg-entity-select').addEventListener('change',e=>{debugEditor.entitySelected=Number(e.target.value)||0;updateDebugEditor();});
for(const id of ['dbg-bx','dbg-by','dbg-bw','dbg-bh']){
  document.getElementById(id).addEventListener('input',applyDebugEditorInputs);
}
document.getElementById('dbg-player-r').addEventListener('input',applyPlayerCollisionInput);
for(const id of ['dbg-ex','dbg-ey','dbg-er']){
  document.getElementById(id).addEventListener('input',applyEntityEditorInputs);
}
document.querySelectorAll('[data-dbg-step]').forEach(btn=>btn.addEventListener('pointerdown',e=>{
  e.preventDefault();nudgeSelectedBlocker(Number(btn.dataset.dbgStep)||0);
}));
document.querySelectorAll('[data-dbg-size]').forEach(btn=>btn.addEventListener('pointerdown',e=>{
  e.preventDefault();nudgeBlockerSize(btn.dataset.dbgSize,Number(btn.dataset.dbgSizeStep)||0);
}));
document.querySelectorAll('[data-dbg-player-step]').forEach(btn=>btn.addEventListener('pointerdown',e=>{
  e.preventDefault();nudgePlayerCollision(Number(btn.dataset.dbgPlayerStep)||0);
}));
document.querySelectorAll('[data-dbg-entity-step]').forEach(btn=>btn.addEventListener('pointerdown',e=>{
  e.preventDefault();nudgeSelectedEntity(Number(btn.dataset.dbgEntityStep)||0);
}));
document.getElementById('dbg-min').addEventListener('pointerdown',e=>{
  e.preventDefault();debugEditor.minimized=!debugEditor.minimized;updateDebugEditor();
});
document.getElementById('dbg-add').addEventListener('pointerdown',e=>{e.preventDefault();addBlocker();});
document.getElementById('dbg-dup').addEventListener('pointerdown',e=>{e.preventDefault();duplicateBlocker();});
document.getElementById('dbg-del').addEventListener('pointerdown',e=>{e.preventDefault();deleteBlocker();});
document.getElementById('dbg-round').addEventListener('pointerdown',e=>{e.preventDefault();roundBlockers();});
document.getElementById('dbg-copy').addEventListener('pointerdown',async e=>{
  e.preventDefault();
  const out=document.getElementById('dbg-map-output'),status=document.getElementById('dbg-copy-status');
  out.value=debugConfigText();out.select();
  try{await navigator.clipboard.writeText(out.value);status.textContent='copied';}
  catch(_){status.textContent='select text';}
  setTimeout(()=>status.textContent='',1200);
});
function pointerToWorld(e){
  const rect=cvs.getBoundingClientRect(),scaleX=VW/rect.width,scaleY=VH/rect.height;
  const sx=(e.clientX-rect.left)*scaleX,screenY=(e.clientY-rect.top)*scaleY;
  const maxCam=Math.max(0,WORLD_H-VH);
  const camY=Math.max(0,Math.min((P.y-floorTop())*0.35,maxCam));
  return {x:sx,y:screenY+camY};
}
cvs.addEventListener('pointerdown',e=>{
  if(!game.debug)return;
  const p=pointerToWorld(e),bs=MAPS[SCENE].blockers;
  for(let i=bs.length-1;i>=0;i--){
    const b=bs[i];
    if(Math.abs(p.x-b.x)<=b.halfW&&Math.abs(p.y-b.y)<=b.halfH){
      e.preventDefault();debugEditor.selected=i;debugEditor.dragging=true;
      debugEditor.dragOffsetX=p.x-b.x;debugEditor.dragOffsetY=p.y-b.y;
      cvs.setPointerCapture?.(e.pointerId);updateDebugEditor();return;
    }
  }
});
cvs.addEventListener('pointermove',e=>{
  if(!game.debug||!debugEditor.dragging)return;
  e.preventDefault();
  const b=selectedBlocker(),p=pointerToWorld(e);if(!b)return;
  b.x=Math.round(p.x-debugEditor.dragOffsetX);b.y=Math.round(p.y-debugEditor.dragOffsetY);
  updateDebugEditor();
});
for(const ev of ['pointerup','pointercancel','lostpointercapture']){
  cvs.addEventListener(ev,()=>{debugEditor.dragging=false;});
}
document.getElementById('act-main').addEventListener('pointerdown',e=>{e.preventDefault();doAction();});
document.getElementById('dialog').addEventListener('pointerdown',e=>{e.preventDefault();if(dlg.active)advance();});
document.getElementById('book-btn').addEventListener('pointerdown',e=>{e.preventDefault();
  if(!document.getElementById('book').classList.contains('show'))openBook('cat');});
document.getElementById('debug-btn').addEventListener('pointerdown',e=>{e.preventDefault();toggleDebug();});
document.getElementById('book-close').addEventListener('pointerdown',e=>{e.preventDefault();
  document.getElementById('book').classList.remove('show');});
document.querySelectorAll('#book .tab').forEach(t=>t.addEventListener('pointerdown',e=>{e.preventDefault();renderBook(t.dataset.tab);}));
addEventListener('keydown',e=>{
  if(e.key==='ArrowUp')held.up=true;if(e.key==='ArrowDown')held.down=true;
  if(e.key==='ArrowLeft')held.left=true;if(e.key==='ArrowRight')held.right=true;
  if(e.key==='z'||e.key==='Z'||e.key==='Enter'||e.key===' '){e.preventDefault();doAction();}
  if(e.key==='b'||e.key==='B'){const b=document.getElementById('book');
    if(b.classList.contains('show'))b.classList.remove('show');else openBook('cat');}
  if((e.key==='d'||e.key==='D')&&!e.repeat&&game.debugEnabled){toggleDebug();}
});
addEventListener('keyup',e=>{
  if(e.key==='ArrowUp')held.up=false;if(e.key==='ArrowDown')held.down=false;
  if(e.key==='ArrowLeft')held.left=false;if(e.key==='ArrowRight')held.right=false;
});
document.getElementById('start-btn').addEventListener('pointerdown',e=>{
  e.preventDefault();document.getElementById('title').classList.add('hide');game.started=true;
});
bindDebugSecretTap(document.getElementById('area-name'));
bindDebugSecretTap(document.getElementById('title-name'));
initDebugAccess();

//============ 更新・描画ループ ============
function updatePlayer(){
  if(dlg.active||document.getElementById('book').classList.contains('show')){P.moving=false;return;}
  let dx=0,dy=0;
  if(held.up){dy=-1;P.dir='up';}else if(held.down){dy=1;P.dir='down';}
  else if(held.left){dx=-1;P.dir='left';}else if(held.right){dx=1;P.dir='right';}
  if(dx||dy){
    const nx=P.x+dx*P.speed,ny=P.y+dy*P.speed;let moved=false;
    if(canWalk(nx,P.y)){P.x=nx;moved=true;}if(canWalk(P.x,ny)){P.y=ny;moved=true;}
    P.moving=moved;P.anim++;
  }else P.moving=false;
}
function render(){
  // カメラはごく僅かに追従（眺めを常にフレーム内へ）
  const maxCam=Math.max(0,WORLD_H-VH);
  let camY=(P.y-floorTop())*0.35; camY=Math.max(0,Math.min(camY,maxCam));
  drawSceneBackground(SCENE,camY);

  const list=[];
  for(const e of ENTITIES){list.push({y:e.y,fn:()=>{
    const sx=e.x,sy=e.y-camY;if(sy<-30||sy>VH+30)return;
    if(e.type==='npc')drawNPC({id:e.id,spriteKey:e.spriteKey,...e.sprite},sx,sy);
    else if(e.type==='cat')drawCat({id:e.id,...e.sprite},sx,sy);
    else if(e.type==='exit'){const p=0.5+0.5*Math.sin(P.anim*0.1);
      ctx.fillStyle=`rgba(217,169,58,${0.16+0.16*p})`;ctx.beginPath();ctx.ellipse(sx,sy,12,5,0,0,7);ctx.fill();}
  }});}
  list.push({y:P.y,fn:()=>drawPlayer(P.x,P.y-camY)});
  list.sort((a,b)=>a.y-b.y);list.forEach(d=>d.fn());

  if(game.nearest&&!dlg.active){
    const e=game.nearest,sy=e.y-camY,p=0.5+0.5*Math.sin(P.anim*0.15);
    const footY=sy+(e.type==='cat'?3:e.type==='npc'?7:e.type==='object'?4:0);
    ctx.strokeStyle=`rgba(217,169,58,${0.28+0.32*p})`;ctx.lineWidth=1.3;
    ctx.beginPath();ctx.ellipse(e.x,footY,7.5,2.8,0,0,7);ctx.stroke();
    const my=footY-(e.type==='cat'?25:e.type==='npc'?30:e.type==='object'?22:18)-p*2;
    R(e.x-1,my,2,4,'#d9a93a');R(e.x-1,my+5,2,2,'#d9a93a');
  }
  if(game.debugEnabled&&game.debug)drawDebug(camY);
}
function loop(){if(game.started){updatePlayer();updateNearest();}render();requestAnimationFrame(loop);}
loadPlayerIdleSprite();
loadPlayerSideWalkSprite();
loadPlayerVerticalWalkSprites();
loadNpcSprites();
loadCatSprites();
loadBackgroundImages();
enterScene('sando',false);
updateCatCount();loop();
</script>
